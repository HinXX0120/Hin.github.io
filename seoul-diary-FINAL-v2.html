<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Wing Sze 🤍 Tsz Hin · Seoul</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Nunito:ital,wght@0,400;0,700;0,900;1,900&family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    body{font-family:'Nunito','Noto Sans TC',sans-serif;background:#fff5f9;-webkit-tap-highlight-color:transparent;overflow-x:hidden;}
    input::-webkit-outer-spin-button,input::-webkit-inner-spin-button{-webkit-appearance:none;}
    .hand{font-family:'Caveat',cursive;}
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
    @keyframes float2{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
    @keyframes hb{0%,100%{transform:scale(1)}50%{transform:scale(1.22)}}
    @keyframes shimmer{0%{background-position:200% center}100%{background-position:-200% center}}
    @keyframes wiggle{0%,100%{transform:rotate(-2deg)}50%{transform:rotate(2deg)}}
    .fl{animation:float 3.4s ease-in-out infinite;}
    .fl2{animation:float2 4s ease-in-out infinite;animation-delay:.7s;}
    .hb{animation:hb 2s ease-in-out infinite;}
    .wg{animation:wiggle 3s ease-in-out infinite;}
    .shimmer-text{background:linear-gradient(90deg,#ff4fa3,#e879f9,#a78bfa,#ff4fa3);background-size:300% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:shimmer 4s linear infinite;}
    .diary-bg{background:#fffdf9;background-image:repeating-linear-gradient(transparent,transparent 27px,#fce7f380 28px);background-size:100% 28px;}
    .dot-bg{background-image:radial-gradient(#ffd6ec 1.4px,transparent 1.4px);background-size:22px 22px;}
    .card{background:#fffdf9;border-radius:1.8rem;box-shadow:0 6px 24px rgba(255,79,163,.11),0 2px 6px rgba(0,0,0,.04);border:2px solid rgba(255,182,219,.35);}
    .tape-top::before,.tape-top::after{content:'';position:absolute;top:-11px;width:54px;height:17px;border-radius:3px;}
    .tape-top::before{left:20px;background:rgba(255,182,219,.6);transform:rotate(-3deg);}
    .tape-top::after{right:24px;background:rgba(196,181,253,.55);transform:rotate(2.5deg);}
    .tape-single::before{content:'';position:absolute;top:-10px;left:50%;transform:translateX(-50%) rotate(-1.5deg);width:54px;height:17px;border-radius:3px;background:rgba(255,182,219,.58);}
    .washi{display:inline-block;font-family:'Caveat',cursive;font-weight:700;font-size:13px;padding:3px 12px;border-radius:3px;letter-spacing:.04em;}
    .wp{background:rgba(255,182,219,.58);color:#be185d;}
    .wu{background:rgba(196,181,253,.52);color:#6d28d9;}
    .wy{background:rgba(253,224,71,.6);color:#92400e;}
    .lbl{display:inline-flex;align-items:center;gap:4px;font-family:'Caveat',cursive;font-size:14px;font-weight:700;padding:3px 10px;border-radius:999px;}
    .lp{background:#fff0f8;color:#be185d;border:1.5px solid #fbcfe8;}
    .lu{background:#faf5ff;color:#7c3aed;border:1.5px solid #ddd6fe;}
    .lg{background:#f0fdf4;color:#065f46;border:1.5px solid #6ee7b7;}
    .btn-pink{background:#ff4fa3;color:#fff;font-weight:900;border-radius:999px;box-shadow:0 9px 0 #db2777;transition:all .15s;border:0;}
    .btn-pink:active{transform:translateY(6px);box-shadow:0 3px 0 #db2777;}
    .btn-soft{background:#fce7f3;color:#be185d;font-weight:900;border-radius:1.2rem;transition:all .15s;border:0;}
    .btn-soft:active{transform:scale(.96);}
    .spot-active{background:#fff0f8!important;border-color:#f9a8d4!important;box-shadow:0 4px 16px rgba(255,79,163,.18)!important;}
    ::-webkit-scrollbar{width:0;}
  </style>
</head>

// ── Map helpers ──
function loadSpot(name) {
  const q = encodeURIComponent(name + ', Seoul, South Korea');
  const iframe = document.getElementById('mapFrame');
  if(iframe) {
    iframe.src = `https://www.google.com/maps?q=${q}&output=embed`;
    state.activeSpot = name;
    // scroll iframe into view
    iframe.scrollIntoView({behavior:'smooth', block:'nearest'});
  }
}

function addMapSpot() {
  const inp = document.getElementById('newSpotInput');
  const name = inp ? inp.value.trim() : '';
  if(!name) return;
  state.mapSpots = [...state.mapSpots, {id:'sp'+Date.now(), name}];
  inp.value = '';
  renderMapPage();
  lucide.createIcons();
}

function deleteMapSpot(id) {
  state.mapSpots = state.mapSpots.filter(s=>s.id!==id);
  renderMapPage();
  lucide.createIcons();
}

function startEditSpot(id) {
  state.editingSpotId = id;
  renderMapPage();
  lucide.createIcons();
  const inp = document.getElementById('editSpot_'+id);
  if(inp) { inp.focus(); inp.select(); }
}

function saveEditSpot(id, val) {
  state.mapSpots = state.mapSpots.map(s=>s.id===id?{...s,name:val.trim()||s.name}:s);
  state.editingSpotId = null;
  renderMapPage();
  lucide.createIcons();
}

function renderMapPage() {
  document.getElementById('page-map').innerHTML = `
    <div class="px-4 pt-6 space-y-5 diary-bg min-h-screen">
      <div class="flex items-center justify-between">
        <div><div class="hand text-pink-400 text-xl font-bold">Google Map</div><h2 class="hand text-3xl font-bold text-[#2d1b3d] leading-tight">首爾地圖 🗺️</h2></div>
        <div class="fl2" style="width:56px;height:56px;">${ci('b')}</div>
      </div>

      <!-- Map iframe -->
      <div class="card overflow-hidden sticky top-0 z-10" style="top:8px;">
        <div class="bg-pink-50 border-b border-pink-100 px-4 py-2 flex items-center gap-2">
          <i data-lucide="map-pin" size="14" class="text-pink-400 shrink-0"></i>
          <span class="hand text-sm text-pink-600 font-bold truncate" id="activeSpotLabel">
            ${state.activeSpot || '👆 按下面景點即可在此顯示'}
          </span>
        </div>
        <iframe id="mapFrame" class="w-full block" style="height:300px;border:0;" loading="lazy" allowfullscreen referrerpolicy="no-referrer-when-downgrade"
          src="https://www.google.com/maps?q=${state.activeSpot ? encodeURIComponent(state.activeSpot+', Seoul') : 'Seoul+South+Korea'}&z=11&output=embed">
        </iframe>
      </div>

      <!-- Add new spot -->
      <div class="card p-4 space-y-3">
        <div class="flex items-center gap-2">${washi('新增景點','p')}</div>
        <div class="flex gap-2">
          <input id="newSpotInput" placeholder="輸入景點名稱（中文或英文）"
            class="flex-1 p-3 bg-pink-50 rounded-2xl hand font-bold text-sm outline-none border-2 border-transparent focus:border-pink-300"
            onkeydown="if(event.key==='Enter')addMapSpot()">
          <button onclick="addMapSpot()" class="btn-pink px-5 py-3 text-sm border-0 shrink-0 rounded-2xl" style="box-shadow:0 5px 0 #db2777;">＋</button>
        </div>
      </div>

      <!-- Spot list -->
      <div class="flex items-center gap-2 px-1">${washi('景點速查','u')}</div>
      <div class="space-y-2 pb-4">
        ${state.mapSpots.map((s,i)=>`
          <div class="card flex items-center gap-3 p-3 ${state.activeSpot===s.name?'spot-active':''}" style="cursor:pointer;">
            <!-- char icon -->
            <div class="shrink-0" style="width:44px;height:44px;" onclick="loadSpot('${s.name.replace(/'/g,"\'")}')">
              ${ci(i%2===0?'k':'b')}
            </div>

            ${state.editingSpotId===s.id ? `
              <!-- edit mode -->
              <input id="editSpot_${s.id}"
                value="${s.name.replace(/"/g,'&quot;')}"
                class="flex-1 hand font-bold text-[#2d1b3d] text-base bg-pink-50 border-2 border-pink-300 rounded-xl px-3 py-1.5 outline-none"
                onkeydown="if(event.key==='Enter')saveEditSpot('${s.id}',this.value)"
                onblur="saveEditSpot('${s.id}',this.value)">
              <button onclick="saveEditSpot('${s.id}',document.getElementById('editSpot_${s.id}').value)" class="btn-pink px-3 py-2 text-xs border-0 rounded-xl shrink-0" style="box-shadow:0 3px 0 #db2777;">✓</button>
            ` : `
              <!-- view mode -->
              <div class="flex-1 min-w-0" onclick="loadSpot('${s.name.replace(/'/g,"\'")}')">
                <p class="hand font-bold text-[#2d1b3d] text-base leading-tight truncate">${s.name}</p>
                <p class="text-pink-400 text-xs font-bold mt-0.5">${state.activeSpot===s.name?'🗺️ 地圖顯示中':'👆 點擊顯示地圖'}</p>
              </div>
              <button onclick="startEditSpot('${s.id}')" class="text-purple-300 hover:text-purple-500 transition-colors p-1.5 shrink-0">
                <i data-lucide="pencil" size="16"></i>
              </button>
              <button onclick="deleteMapSpot('${s.id}')" class="text-red-200 hover:text-red-400 transition-colors p-1.5 shrink-0">
                <i data-lucide="trash-2" size="16"></i>
              </button>
            `}
          </div>
        `).join('')}
      </div>
    </div>
  `;
  lucide.createIcons();
}

    <div class="cursor-pointer fl" style="width:68px;height:68px;" onclick="go('start')">${ci('k')}</div>
  </div>
  <div class="card overflow-hidden relative">
    <div class="tape-top relative px-6 pt-8 pb-5 bg-gradient-to-br from-pink-500 via-fuchsia-400 to-purple-400 text-white">
      <div class="absolute -right-4 -bottom-4 text-[88px] opacity-20 select-none leading-none">🩷</div>
      <h3 class="hand text-4xl font-bold leading-tight">首爾戀愛旅程</h3>
      <div class="flex gap-3 mt-4 flex-wrap">
        <div class="bg-white/25 rounded-2xl px-4 py-2 text-center backdrop-blur-sm"><div class="text-2xl font-black">5</div><div class="text-[9px] opacity-80 uppercase">Days</div></div>
        <div class="bg-white/25 rounded-2xl px-4 py-2 text-center backdrop-blur-sm"><div class="text-xl font-black">${state.mapSpots.length}</div><div class="text-[9px] opacity-80 uppercase">Spots</div></div>
        <div class="bg-white/25 rounded-2xl px-4 py-2 text-center backdrop-blur-sm flex-1"><div class="text-xl font-black">₩${totalKRW().toLocaleString()}</div><div class="text-[9px] opacity-80 uppercase">Budget</div></div>
      </div>
    </div>
    <div class="flex items-center gap-3 px-5 py-3 bg-pink-50 border-t border-pink-100">
      <div style="width:44px;height:44px;">${ci('b')}</div>
      <p class="hand text-pink-600 text-base font-bold">「一齊去首爾啦～ 🩷」</p>
    </div>
  </div>
  <div class="flex items-center gap-2 px-1">${washi('每日行程','p')}</div>
  <div class="space-y-4">
    ${state.days.map(d=>`
      <button class="card w-full text-left p-4 flex items-center gap-4 active:scale-[.97] transition-transform relative overflow-visible" onclick="go('day',{selDay:${d.id}})">
        <div class="absolute -top-2.5 left-4 washi w${wc[d.day-1]} text-xs py-0.5 px-3" style="transform:rotate(${rot[d.day-1]}deg);">Day ${d.day}</div>
        <div class="shrink-0 mt-2" style="width:60px;height:60px;">${ci(d.day%2===0?'b':'k')}</div>
        <div class="flex-1 min-w-0 mt-2">
          <div class="flex flex-wrap gap-1 mb-1">${lbl(d.mood,moods[d.day-1][0])}</div>
          <p class="hand text-xl font-bold text-[#2d1b3d] leading-tight truncate">${d.title}</p>
          <p class="text-gray-400 text-xs mt-1 truncate">${d.stops.map(s=>s.name).join(' · ')}</p>
        </div>
        <i data-lucide="chevron-right" class="text-pink-300 shrink-0 mt-2" size="20"></i>
      </button>
    `).join('')}
  </div>
</div>`;

const renderDay=()=>{
  const d=state.days.find(x=>x.id===state.selDay)||state.days[0];
  return `
<div class="px-4 pt-6 space-y-5 diary-bg min-h-screen">
  <button onclick="go('home')" class="btn-soft px-5 py-3 flex items-center gap-2 text-sm"><i data-lucide="chevron-left" size="18"></i> 返回行程</button>
  <div class="card overflow-visible relative">
    <div class="absolute -top-3 left-5 washi wp text-sm">Day ${d.day}</div>
    <div class="absolute -top-3 right-10 washi wu text-sm">${d.mood}</div>
    <div class="bg-gradient-to-br from-pink-500 to-fuchsia-400 rounded-t-[1.6rem] p-5 flex gap-4 items-center">
      <div class="shrink-0" style="width:90px;height:90px;">${ci(d.day%2===0?'b':'k')}</div>
      <div class="text-white">
        <h2 class="hand text-2xl font-bold leading-tight">${d.title}</h2>
        <p class="text-white/85 text-sm mt-1">${d.note}</p>
      </div>
    </div>
    <div class="p-5 space-y-3">
      <div class="flex items-center gap-2">${washi('景點行程','y')}</div>
      ${d.stops.map((s,i)=>`
        <div class="bg-[#fff8fb] rounded-2xl p-4 border border-pink-100 flex items-center gap-4">
          <div class="w-8 h-8 bg-gradient-to-br from-pink-400 to-fuchsia-400 rounded-xl flex items-center justify-center text-white font-black text-sm shrink-0">${i+1}</div>
          <div class="flex-1 min-w-0">
            <input value="${s.name}" onchange="updStop(${d.id},'${s.id}','name',this.value)" class="hand font-bold text-[#2d1b3d] bg-transparent border-none text-base p-0 focus:outline-none w-full">
            <div class="flex items-center gap-1 text-pink-400 text-xs font-bold mt-0.5">
              <i data-lucide="navigation" size="10"></i>
              <input value="${s.go}" onchange="updStop(${d.id},'${s.id}','go',this.value)" class="bg-transparent border-none p-0 focus:outline-none w-full text-xs">
            </div>
          </div>
          <button onclick="delStop(${d.id},'${s.id}')" class="text-red-200 hover:text-red-400"><i data-lucide="x" size="18"></i></button>
        </div>
      `).join('')}
      <button onclick="addStop(${d.id})" class="w-full btn-soft py-3 flex items-center justify-center gap-2 text-sm mt-2">
        <i data-lucide="plus" size="16"></i> 加入景點
      </button>
    </div>
  </div>
  <div class="flex gap-3">
    ${d.day>1?`<button onclick="go('day',{selDay:${d.id-1}})" class="flex-1 btn-soft py-4 flex items-center justify-center gap-2 text-sm"><i data-lucide="chevron-left" size="16"></i> Day ${d.day-1}</button>`:'<div class="flex-1"></div>'}
    ${d.day<5?`<button onclick="go('day',{selDay:${d.id+1}})" class="flex-1 btn-pink py-4 flex items-center justify-center gap-2 text-sm tracking-widest border-0">Day ${d.day+1} <i data-lucide="chevron-right" size="16"></i></button>`:'<div class="flex-1"></div>'}
  </div>
</div>`;
};

const renderBudget=()=>{
  const total=totalKRW();
  return `
<div class="px-4 pt-6 space-y-5 diary-bg min-h-screen">
  <div class="flex items-center justify-between">
    <div><div class="hand text-pink-400 text-xl font-bold">Budget Planner</div><h2 class="hand text-3xl font-bold text-[#2d1b3d] leading-tight">旅費預算 💰</h2></div>
    <div class="fl" style="width:56px;height:56px;">${ci('k')}</div>
  </div>
  <div class="card overflow-hidden">
    <div class="bg-gradient-to-br from-pink-500 to-fuchsia-400 p-7 text-white relative">
      <div class="absolute -right-3 -bottom-3 opacity-20 text-8xl select-none leading-none">₩</div>
      <p class="hand text-lg font-bold opacity-80 mb-1">Total (KRW)</p>
      <h3 class="text-5xl font-black tracking-tighter">₩${total.toLocaleString()}</h3>
      <div class="flex gap-3 mt-5">
        <div class="bg-white/20 rounded-2xl px-4 py-3 flex-1 backdrop-blur-sm"><div class="text-[9px] opacity-80 uppercase font-black mb-1">約港幣</div><div class="text-2xl font-black">HK$${(total/state.rate).toFixed(0)}</div></div>
        <div class="bg-white/20 rounded-2xl px-4 py-3 w-28 backdrop-blur-sm"><div class="text-[9px] opacity-80 uppercase font-black mb-1">Rate</div><input type="number" value="${state.rate}" onchange="state.rate=Number(this.value)||170;render();" class="bg-transparent border-none text-white font-black text-xl w-full p-0 focus:outline-none"></div>
      </div>
    </div>
    <div class="flex items-center gap-3 px-5 py-3 bg-pink-50 border-t border-pink-100">
      <div style="width:40px;height:40px;">${ci('b')}</div>
      <p class="hand text-pink-600 text-base font-bold">買到笑！ 🛍️</p>
    </div>
  </div>
  <div class="card p-5 space-y-3">
    <div class="flex items-center gap-2">${washi('新增支出','p')}</div>
    <input id="en" placeholder="支出項目" class="w-full p-4 bg-pink-50 rounded-2xl hand font-bold text-sm outline-none border-2 border-transparent focus:border-pink-300">
    <input id="ea" type="number" placeholder="金額 KRW" class="w-full p-4 bg-pink-50 rounded-2xl hand font-bold text-sm outline-none border-2 border-transparent focus:border-pink-300">
    <button onclick="addExp()" class="btn-pink w-full py-4 text-base tracking-widest border-0">＋ Add</button>
  </div>
  <div class="flex items-center gap-2 px-1">${washi('支出清單','u')}</div>
  <div class="space-y-3">
    ${state.expenses.map((e,i)=>`
      <div class="card flex items-center gap-4 p-4">
        <div class="shrink-0" style="width:52px;height:52px;">${ci(i%2===0?'k':'b')}</div>
        <div class="flex-1 min-w-0"><p class="hand font-bold text-[#2d1b3d] truncate text-base">${e.item}</p><p class="text-pink-400 text-xs font-bold italic">₩${e.amount.toLocaleString()} · HK$${(e.amount/state.rate).toFixed(1)}</p></div>
        <button onclick="delExp(${e.id})" class="text-red-200 hover:text-red-400"><i data-lucide="x" size="20"></i></button>
      </div>
    `).join('')}
  </div>
</div>`;
};

const renderNav=()=>`
<nav class="fixed bottom-0 left-0 right-0 max-w-[430px] mx-auto bg-[#fffdf9] border-t-4 border-pink-200 px-8 pt-3 pb-9 flex justify-between items-center z-50 shadow-[0_-6px_24px_rgba(255,79,163,.1)]">
  ${[['home','book-open','行程'],['map','map','地圖'],['budget','wallet','預算']].map(([p,ic,lb])=>`
    <button onclick="go('${p}')" class="flex flex-col items-center gap-1 transition-all ${state.page===p?'text-pink-500 scale-110':'text-gray-300'}">
      <i data-lucide="${ic}" size="24"></i><span class="hand text-[12px] font-bold">${lb}</span>
    </button>
  `).join('')}
</nav>`;

const updStop=(dId,sId,f,v)=>{state.days=state.days.map(d=>d.id!==dId?d:{...d,stops:d.stops.map(s=>s.id!==sId?s:{...s,[f]:v})});};
const addStop=(dId)=>{state.days=state.days.map(d=>d.id!==dId?d:{...d,stops:[...d.stops,{id:'s'+Date.now(),name:'新景點',go:'交通方式'}]});render();};
const delStop=(dId,sId)=>{state.days=state.days.map(d=>d.id!==dId?d:{...d,stops:d.stops.filter(s=>s.id!==sId)});render();};
const addExp=()=>{const n=document.getElementById('en'),a=document.getElementById('ea');if(!n.value||!a.value)return;state.expenses.unshift({id:Date.now(),item:n.value,amount:parseFloat(a.value)});n.value='';a.value='';render();};
const delExp=(id)=>{state.expenses=state.expenses.filter(e=>e.id!==id);render();};

const render=()=>{
  const root=document.getElementById('root');
  if(state.page==='start'){
    root.innerHTML=renderStart();
  } else {
    root.innerHTML=`
      <div id="page-home" class="${state.page==='home'?'':'hidden'}">${renderHome()}</div>
      <div id="page-map" class="${state.page==='map'?'':'hidden'}"></div>
      <div id="page-day" class="${state.page==='day'?'':'hidden'}">${renderDay()}</div>
      <div id="page-budget" class="${state.page==='budget'?'':'hidden'}">${renderBudget()}</div>
      ${renderNav()}
    `;
    renderMapPage();
  }
  lucide.createIcons();
};
render();
</script>
</body>
</html>
